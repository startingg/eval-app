<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어드민 — 수습사원 중간평가</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--pink:#D4537E;--pink-light:#FBEAF0;--pink-dark:#993556;--teal:#0F6E56;--bg:#F5F4F1;--bg-card:#FFFFFF;--bg-muted:#F1EFE8;--border:rgba(0,0,0,0.1);--border-md:rgba(0,0,0,0.18);--text:#1a1a1a;--text-muted:#6b6b6b;--text-faint:#aaaaaa;--radius:10px;--radius-lg:14px;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .nav{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50}
  .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
  .nav-logo{width:32px;height:32px;background:var(--pink);border-radius:8px;display:flex;align-items:center;justify-content:center}
  .nav-logo i{color:#fff;font-size:16px}
  .nav-title{font-size:15px;font-weight:700;color:var(--text)}
  .nav-right{display:flex;align-items:center;gap:8px}
  .nav-badge{font-size:11px;background:var(--bg-muted);color:var(--text-muted);padding:3px 10px;border-radius:20px;font-weight:700}
  .nav-link{font-size:13px;color:var(--text-muted);text-decoration:none;display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:1px solid var(--border-md);transition:all .15s}
  .nav-link:hover{background:var(--bg-muted);color:var(--text)}
  .main{max-width:820px;margin:0 auto;padding:28px 20px 60px}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
  .page-header h1{font-size:22px;font-weight:700}
  .mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
  .mcard{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
  .mlbl{font-size:11px;color:var(--text-muted);margin-bottom:5px;font-weight:500}
  .mval{font-size:26px;font-weight:700;color:var(--text)}
  .msub{font-size:11px;color:var(--text-faint);margin-top:2px}
  .bar-cont{height:5px;background:var(--bg-muted);border-radius:3px;margin-top:8px}
  .bar-fill{height:100%;border-radius:3px;background:var(--pink);transition:width .4s}
  .scard{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px}
  .scard-header{padding:13px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .scard-header h2{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
  .scard-header h2 i{font-size:15px;color:var(--text-muted)}
  .scard-body{padding:18px 20px}
  .fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  label.fl{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px;display:block}
  select,input[type=text],input[type=date],textarea{width:100%;font-family:'Noto Sans KR',sans-serif;font-size:14px;padding:8px 12px;border:1px solid var(--border-md);border-radius:var(--radius);background:#fff;color:var(--text);outline:none;transition:border-color .15s}
  select:focus,input:focus{border-color:var(--pink)}
  .btn{font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid var(--border-md);background:#fff;cursor:pointer;color:var(--text-muted);font-family:'Noto Sans KR',sans-serif;display:inline-flex;align-items:center;gap:4px;transition:all .15s}
  .btn:hover{background:var(--bg-muted);color:var(--text)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.pink{background:var(--pink);color:#fff;border-color:var(--pink)}.btn.pink:hover{opacity:.88}
  .btn.teal{background:var(--teal);color:#fff;border-color:var(--teal)}.btn.teal:hover{opacity:.88}
  .btn.danger{color:#A32D2D}.btn.danger:hover{background:#FCEBEB}
  .date-preview{background:var(--bg-muted);border-radius:var(--radius);padding:9px 14px;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:7px;margin-top:12px}
  .trow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
  .trow:last-child{border-bottom:none}
  .av{width:34px;height:34px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#185FA5;flex-shrink:0}
  .tinfo{flex:1;min-width:0}
  .tname{font-size:13px;font-weight:700;color:var(--text)}
  .tteam{font-size:11px;font-weight:400;color:var(--text-muted);margin-left:5px}
  .stags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
  .stag{font-size:10px;background:var(--pink-light);color:var(--pink-dark);padding:1px 7px;border-radius:20px;font-weight:500}
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12px;min-width:580px}
  th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg-muted)}
  td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:var(--bg-muted)}
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
  .cdone{background:#EAF3DE;color:#3B6D11}.cwait{background:#FAEEDA;color:#854F0B}
  .gpill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;min-width:36px;text-align:center}
  .gS{background:#E1F5EE;color:#0F6E56}.gA{background:#EAF3DE;color:#3B6D11}.gB{background:#FAEEDA;color:#854F0B}.gC{background:#FAECE7;color:#993C1D}.gP{background:var(--bg-muted);color:var(--text-faint)}
  .detail-tr{display:none}.detail-tr.show{display:table-row}
  .detail-panel{background:var(--bg-muted);padding:14px 16px}
  .cat-div{font-size:10px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;margin:8px 0 3px}
  .drow{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)}.drow:last-child{border-bottom:none}
  .score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
  .score-box{background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 10px}
  .score-box-label{font-size:10px;color:var(--text-muted);margin-bottom:2px}
  .score-box-val{font-size:14px;font-weight:700;color:var(--text)}
  .score-box-val span{font-size:10px;color:var(--text-faint)}
  .daytab-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .daytab{padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border-md);background:#fff;color:var(--text-muted);font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all .15s}
  .daytab.active{background:var(--pink);color:#fff;border-color:var(--pink)}.daytab:hover:not(.active){background:var(--bg-muted)}
  .day-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .day-stat{background:var(--bg-muted);border-radius:8px;padding:7px 13px;font-size:12px}
  .day-stat span{color:var(--text-muted)}.day-stat strong{color:var(--text);margin-left:5px}
  .day-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
  .t-day-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
  .t-day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
  .cat-mini{display:flex;flex-wrap:wrap;gap:3px;margin:7px 0}
  .cat-mini-item{font-size:10px;background:var(--bg-muted);color:var(--text-muted);padding:2px 6px;border-radius:20px}
  .db-status{position:fixed;top:60px;right:16px;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500;z-index:40}
  .db-status.ok{background:#EAF3DE;color:#3B6D11}.db-status.err{background:#FCEBEB;color:#A32D2D}.db-status.loading{background:#FAEEDA;color:#854F0B}
  .spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,.15);border-top-color:var(--text-muted);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="db-status loading" id="db-status">● 연결 중...</div>

<nav class="nav">
  <a class="nav-brand" href="index.html">
    <div class="nav-logo"><i class="ti ti-heart"></i></div>
    <span class="nav-title">수습사원 중간평가</span>
  </a>
  <div class="nav-right">
    <span class="nav-badge">어드민</span>
    <button class="btn" onclick="loadAll()" id="refresh-btn"><i class="ti ti-refresh" style="font-size:12px"></i>새로고침</button>
    <a class="nav-link" href="index.html"><i class="ti ti-clipboard-list" style="font-size:14px"></i>평가 작성</a>
  </div>
</nav>

<main class="main">
  <div class="page-header">
    <h1>평가 현황 어드민</h1>
    <button class="btn danger" onclick="resetAllData()" style="border-color:rgba(162,45,45,0.3)"><i class="ti ti-trash" style="font-size:12px"></i>전체 초기화</button>
  </div>

  <div class="mgrid">
    <div class="mcard"><div class="mlbl">전체 대상자</div><div class="mval" id="am-total">—</div><div class="msub">수습사원</div></div>
    <div class="mcard"><div class="mlbl">제출 완료</div><div class="mval" id="am-done">—</div><div class="msub">명</div></div>
    <div class="mcard"><div class="mlbl">평균 점수</div><div class="mval" id="am-avg">—</div><div class="msub" id="am-avg-sub">점</div></div>
    <div class="mcard"><div class="mlbl">제출률</div><div class="mval" id="am-rate">—</div><div class="bar-cont"><div class="bar-fill" id="am-rate-bar" style="width:0%"></div></div></div>
  </div>

  <!-- 날짜 설정 -->
  <div class="scard">
    <div class="scard-header"><h2><i class="ti ti-calendar"></i>날짜 설정</h2></div>
    <div class="scard-body">
      <div class="fg2">
        <div><label class="fl">입사일</label><input type="date" id="admin-join-date"><div style="font-size:11px;color:var(--text-faint);margin-top:4px">평가서에 표시되는 수습사원 입사일</div></div>
        <div><label class="fl">평가 기준일</label><input type="date" id="admin-eval-date"><div style="font-size:11px;color:var(--text-faint);margin-top:4px">평가일별 탭 분류 기준 · 제출 시 이 날짜로 저장</div></div>
      </div>
      <div class="date-preview"><i class="ti ti-eye" style="font-size:13px"></i>평가서 표시: <strong id="date-preview-text" style="margin-left:4px;color:var(--text)"></strong></div>
      <div style="margin-top:10px"><button class="btn pink" onclick="saveDates()"><i class="ti ti-device-floppy" style="font-size:12px"></i>날짜 저장 (모든 기기에 반영)</button></div>
    </div>
  </div>

  <!-- 수습사원 관리 -->
  <div class="scard">
    <div class="scard-header">
      <h2><i class="ti ti-users"></i>수습사원 관리</h2>
      <button class="btn" onclick="toggleAddForm()" id="add-toggle-btn"><i class="ti ti-plus" style="font-size:12px"></i>수습사원 추가</button>
    </div>
    <div class="scard-body" style="padding-bottom:8px">
      <div id="add-form" style="display:none;background:var(--bg-muted);border-radius:var(--radius);padding:14px;margin-bottom:14px">
        <div class="fg2">
          <div><label class="fl">이름</label><input type="text" id="new-name" placeholder="홍길동"></div>
          <div><label class="fl">소속팀</label><input type="text" id="new-team" placeholder="영업팀"></div>
        </div>
        <div class="fg2">
          <div><label class="fl">사수 1 (필수)</label><input type="text" id="new-sasu1" placeholder="김철수 과장"></div>
          <div><label class="fl">사수 2 (선택)</label><input type="text" id="new-sasu2" placeholder="이영희 대리"></div>
        </div>
        <div style="display:flex;gap:7px">
          <button class="btn pink" id="add-submit-btn" onclick="addTrainee()">추가하기</button>
          <button class="btn" onclick="cancelAddForm()">취소</button>
        </div>
      </div>
      <div id="trainee-list"><div style="text-align:center;padding:20px;color:var(--text-faint)"><span class="spinner"></span></div></div>
    </div>
  </div>

  <!-- 평가일별 현황 -->
  <div class="scard">
    <div class="scard-header"><h2><i class="ti ti-calendar-stats"></i>평가일별 현황</h2></div>
    <div class="scard-body">
      <div id="day-tabs" class="daytab-row"><span style="font-size:12px;color:var(--text-faint)">제출된 평가서가 없습니다.</span></div>
      <div id="day-content"></div>
    </div>
  </div>

  <!-- 전체 현황 -->
  <div class="scard">
    <div class="scard-header"><h2><i class="ti ti-list-check"></i>전체 제출 현황</h2></div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th style="width:80px">수습사원</th><th style="width:65px">팀</th><th>사수</th>
          <th style="width:100px">제출일시</th><th style="width:60px">총점</th>
          <th style="width:55px">지시이행</th><th style="width:55px">등급</th>
          <th style="width:55px">상태</th><th style="width:80px"></th>
        </tr></thead>
        <tbody id="admin-tbody"><tr><td colspan="9" style="text-align:center;padding:28px;color:var(--text-faint)"><span class="spinner"></span> 로딩 중...</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<script>
/* ── Supabase 설정 ── */
const SUPABASE_URL = 'https://cwtjwwnkvchzddhqgkvt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3dGp3d25rdmNoemRkaHFna3Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMDg2NjUsImV4cCI6MjA5NDc4NDY2NX0.7I1w-Hrfb6HoYR5SkH2HFezFNi0i4E3gWvmiXWqeF7o';

const API = SUPABASE_URL + '/rest/v1';
const H = { 'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY };

async function sbGet(t,q=''){const r=await fetch(`${API}/${t}?${q}`,{headers:H});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPost(t,b){const r=await fetch(`${API}/${t}`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPatch(t,q,b){const r=await fetch(`${API}/${t}?${q}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbDelete(t,q){const r=await fetch(`${API}/${t}?${q}`,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text());}
async function sbUpsert(t,b){const r=await fetch(`${API}/${t}`,{method:'POST',headers:{...H,'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json();}

function setStatus(state,msg=''){
  const el=document.getElementById('db-status');
  el.className='db-status '+state;
  el.textContent=state==='ok'?'● DB 연결됨':state==='err'?'● 오류: '+msg:'● 연결 중...';
}

const CRITERIA={
  task:[{id:'t1',label:'업무 이해도'},{id:'t2',label:'업무 처리 속도'},{id:'t3',label:'업무 정확도'}],
  attitude:[{id:'a1',label:'적극성 및 주도성'},{id:'a2',label:'팀워크 및 협업'},{id:'a3',label:'시간 관리 및 규율'}],
  growth:[{id:'g1',label:'학습 능력 및 적응력'},{id:'g2',label:'문제 해결 능력'}],
  instruction:[{id:'i1',label:'지시 이해 및 파악'},{id:'i2',label:'지시 이행 완수도'},{id:'i3',label:'피드백 수용 및 반영'},{id:'i4',label:'보고 및 소통'}],
};
const CAT_KO={task:'업무 역량',attitude:'태도 및 협업',growth:'성장 가능성',instruction:'지시 이행'};
const SL=['','미흡','보통','양호','우수','탁월'];
let trainees=[],evals=[],editingId=null,selDayTab=null;

function todayStr(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;}
function fmtDate(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${y}.${m}.${d}`;}
function fmtDateKo(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;}
function nowDT(){const n=new Date();return`${n.getFullYear()}.${String(n.getMonth()+1).padStart(2,'0')}.${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;}
function initials(n){return n?n.slice(0,2):'?';}

async function loadAll(){
  const btn=document.getElementById('refresh-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>로딩...';
  try{
    trainees=await sbGet('trainees','order=created_at.asc');
    evals=await sbGet('evaluations','order=created_at.asc');
    const settings=await sbGet('app_settings','');
    const j=settings.find(s=>s.key==='join_date')?.value||'2025-03-30';
    const e=settings.find(s=>s.key==='eval_date')?.value||todayStr();
    document.getElementById('admin-join-date').value=j;
    document.getElementById('admin-eval-date').value=e;
    updateDatePreview(j,e);
    setStatus('ok');
    renderAll();
  }catch(err){setStatus('err',err.message.slice(0,30));}
  finally{btn.disabled=false;btn.innerHTML='<i class="ti ti-refresh" style="font-size:12px"></i>새로고침';}
}

async function saveDates(){
  const j=document.getElementById('admin-join-date').value;
  const e=document.getElementById('admin-eval-date').value;
  if(!j||!e){alert('날짜를 모두 입력해주세요.');return;}
  try{
    await sbUpsert('app_settings',[{key:'join_date',value:j},{key:'eval_date',value:e}]);
    updateDatePreview(j,e);
    alert('날짜가 저장되었습니다. 모든 기기에 즉시 반영됩니다.');
  }catch(err){alert('저장 실패: '+err.message);}
}
function updateDatePreview(j,e){
  document.getElementById('date-preview-text').textContent=`입사일 ${fmtDateKo(j)} · 평가 기준일 ${fmtDateKo(e)}`;
}

function renderTraineeList(){
  const el=document.getElementById('trainee-list');
  if(!trainees.length){el.innerHTML='<div style="text-align:center;color:var(--text-faint);font-size:13px;padding:18px 0">등록된 수습사원이 없습니다.</div>';return;}
  el.innerHTML=trainees.map(t=>`
    <div class="trow">
      <div class="av">${initials(t.name)}</div>
      <div class="tinfo">
        <div><span class="tname">${t.name}</span><span class="tteam">${t.team}</span></div>
        <div class="stags">
          ${t.sasu1?`<span class="stag"><i class="ti ti-user" style="font-size:10px;margin-right:2px"></i>${t.sasu1}</span>`:''}
          ${t.sasu2?`<span class="stag"><i class="ti ti-user" style="font-size:10px;margin-right:2px"></i>${t.sasu2}</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:5px;flex-shrink:0">
        <button class="btn" onclick="editTrainee('${t.id}')"><i class="ti ti-edit" style="font-size:12px"></i></button>
        <button class="btn danger" onclick="deleteTrainee('${t.id}')"><i class="ti ti-trash" style="font-size:12px"></i></button>
      </div>
    </div>`).join('');
}

function toggleAddForm(){
  const f=document.getElementById('add-form');const open=f.style.display==='none';
  f.style.display=open?'block':'none';
  document.getElementById('add-toggle-btn').innerHTML=open?'<i class="ti ti-x" style="font-size:12px"></i>닫기':'<i class="ti ti-plus" style="font-size:12px"></i>수습사원 추가';
  if(open){['new-name','new-team','new-sasu1','new-sasu2'].forEach(id=>document.getElementById(id).value='');editingId=null;const sb=document.getElementById('add-submit-btn');sb.textContent='추가하기';sb.onclick=addTrainee;}
}
function cancelAddForm(){if(document.getElementById('add-form').style.display!=='none')toggleAddForm();}

async function addTrainee(){
  const name=document.getElementById('new-name').value.trim();
  const team=document.getElementById('new-team').value.trim();
  const sasu1=document.getElementById('new-sasu1').value.trim();
  const sasu2=document.getElementById('new-sasu2').value.trim();
  if(!name||!team||!sasu1){alert('이름, 소속팀, 사수 1은 필수입니다.');return;}
  const sb=document.getElementById('add-submit-btn');
  sb.disabled=true;sb.textContent='저장 중...';
  try{
    if(editingId){
      await sbPatch('trainees',`id=eq.${editingId}`,{name,team,sasu1,sasu2});
      editingId=null;
    }else{
      const id='tid_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
      await sbPost('trainees',{id,name,team,sasu1,sasu2});
    }
    toggleAddForm();await loadAll();
  }catch(err){alert('저장 실패: '+err.message);}
  finally{sb.disabled=false;sb.textContent='추가하기';}
}

function editTrainee(id){
  const t=trainees.find(x=>x.id===id);if(!t)return;editingId=id;
  document.getElementById('new-name').value=t.name;document.getElementById('new-team').value=t.team;
  document.getElementById('new-sasu1').value=t.sasu1;document.getElementById('new-sasu2').value=t.sasu2||'';
  document.getElementById('add-form').style.display='block';
  document.getElementById('add-toggle-btn').innerHTML='<i class="ti ti-x" style="font-size:12px"></i>닫기';
  const sb=document.getElementById('add-submit-btn');sb.textContent='수정 완료';sb.onclick=addTrainee;
}

async function deleteTrainee(id){
  if(!confirm('삭제하시겠습니까? 제출된 평가서도 함께 삭제됩니다.'))return;
  try{await sbDelete('trainees',`id=eq.${id}`);await loadAll();}
  catch(err){alert('삭제 실패: '+err.message);}
}

async function resetAllData(){
  if(!confirm('⚠️ 수습사원 정보와 모든 평가서가 DB에서 삭제됩니다.\n정말 초기화하시겠습니까?'))return;
  try{
    if(evals.length)await sbDelete('evaluations','created_at=gte.1970-01-01');
    if(trainees.length)await sbDelete('trainees','created_at=gte.1970-01-01');
    await loadAll();alert('초기화 완료.');
  }catch(err){alert('초기화 실패: '+err.message);}
}

/* ── PDF ── */
function printReport(dataList,dateLabel){
  const gradeColor={S:'#0F6E56',A:'#3B6D11',B:'#B45309',C:'#B91C1C'};
  const gradeBg={S:'#ECFDF5',A:'#F0FDF4',B:'#FFFBEB',C:'#FFF1F2'};
  const gradeText={S:'S등급',A:'A등급',B:'B등급',C:'C등급'};
  const catAccent={task:'#3B6D11',attitude:'#185FA5',growth:'#6D3B9A',instruction:'#C2185B'};
  const scoreColor=['#ddd','#EF4444','#F97316','#EAB308','#22C55E','#10B981'];
  const scoreBg=['#f5f5f5','#FFF1F2','#FFF7ED','#FEFCE8','#F0FDF4','#ECFDF5'];
  const fontStack="'Apple SD Gothic Neo','맑은 고딕','Malgun Gothic','나눔고딕','NanumGothic',sans-serif";
  function scoreDots(v){return[1,2,3,4,5].map(n=>`<span style="display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:3px;background:${n<=v?scoreColor[v]:'#e5e7eb'}"></span>`).join('');}
  function pctBar(s,m,c){const p=Math.round(s/m*100);return`<div style="height:6px;background:#eee;border-radius:4px;margin-top:4px;overflow:hidden"><div style="height:100%;width:${p}%;background:${c};border-radius:4px"></div></div>`;}
  let body='';
  dataList.forEach((d,idx)=>{
    const tn=d.trainee_name||d.trainee?.name||'';
    const tt=d.trainee_team||d.trainee?.team||'';
    const s1=d.sasu1||d.trainee?.sasu1||'';
    const s2=d.sasu2||d.trainee?.sasu2||'';
    const ratings=d.ratings||{};
    const catScores=d.cat_scores||d.catScores||{};
    const insScore=d.ins_score||0, insMax=d.ins_max||20;
    const total=d.total_score||0, max=d.max_score||60, grade=d.grade||'—';
    const gc=gradeColor[grade]||'#888',gb=gradeBg[grade]||'#f9f9f9',gt=gradeText[grade]||'—';
    const pct=Math.round(total/max*100);
    body+=`<div class="person">
      <div class="person-banner">
        <div><div class="person-num">평가 ${idx+1}</div><div class="person-name">${tn} <span class="person-team">${tt}</span></div><div class="person-sasu">담당 사수 &nbsp;${s1}${s2?' · '+s2:''}</div></div>
        <div style="text-align:right"><div class="grade-circle" style="background:${gb};border:2px solid ${gc};color:${gc}">${gt}</div><div style="font-size:8pt;color:#888;margin-top:6px">입사 ${fmtDate(d.join_date)}</div><div style="font-size:8pt;color:#888">제출 ${d.submit_datetime}</div></div>
      </div>
      <div class="total-row">
        <div class="total-score-box"><span class="total-num">${total}</span><span class="total-denom"> / ${max}점</span></div>
        <div style="flex:1;padding:0 16px"><div style="display:flex;justify-content:space-between;font-size:8.5pt;color:#666;margin-bottom:3px"><span>종합 점수</span><span>${pct}%</span></div><div style="height:8px;background:#eee;border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,${gc},${gc}aa);border-radius:4px"></div></div></div>
        <div class="ins-box"><div style="font-size:8pt;color:#C2185B;font-weight:700;margin-bottom:2px">지시 이행</div><div style="font-size:13pt;font-weight:700;color:#C2185B">${insScore}<span style="font-size:8.5pt;color:#ddd;font-weight:400"> / ${insMax}</span></div>${pctBar(insScore,insMax,'#C2185B')}</div>
      </div>
      <div class="cat-summary">${Object.entries(catScores).map(([k,s])=>`<div class="cat-sum-box"><div class="cat-sum-label" style="color:${catAccent[k]}">${CAT_KO[k]}</div><div class="cat-sum-score">${s}<span class="cat-sum-max"> / ${CRITERIA[k].length*5}</span></div>${pctBar(s,CRITERIA[k].length*5,catAccent[k])}</div>`).join('')}</div>
      <div class="detail-section">${Object.entries(CRITERIA).map(([cat,items])=>`<div class="cat-block"><div class="cat-block-title" style="border-left:3px solid ${catAccent[cat]};padding-left:7px">${CAT_KO[cat]}<span class="cat-block-score" style="color:${catAccent[cat]}">${catScores[cat]||0} / ${items.length*5}</span></div>${items.map(c=>{const v=ratings[c.id]||0;return`<div class="item-row"><span class="item-name">${c.label}</span><div class="item-right">${scoreDots(v)}<span class="item-score" style="color:${scoreColor[v]};background:${scoreBg[v]}">${v}점</span><span class="item-word">${SL[v]}</span></div></div>`;}).join('')}</div>`).join('')}</div>
      ${(d.strength||d.improve)?`<div class="comment-section">${d.strength?`<div class="comment-box good"><div class="comment-label">✓ 잘하는 점</div><div class="comment-text">${d.strength}</div></div>`:''} ${d.improve?`<div class="comment-box improve"><div class="comment-label">△ 개선이 필요한 점</div><div class="comment-text">${d.improve}</div></div>`:''}</div>`:''}
    </div>`;
  });
  const css=`@page{margin:12mm 16mm;size:A4 portrait;}*{box-sizing:border-box;margin:0;padding:0;}body{font-family:${fontStack};color:#1a1a1a;font-size:10pt;line-height:1.6;background:#fff;}.cover{margin-bottom:22px;padding-bottom:14px;border-bottom:3px solid #1a1a1a;}.cover-title{font-size:18pt;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px;}.cover-meta{font-size:9pt;color:#666;}.cover-meta span{margin-right:14px;}.person{page-break-inside:avoid;margin-bottom:28px;}.person-banner{background:#f8f7f4;border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}.person-num{font-size:8pt;color:#aaa;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}.person-name{font-size:15pt;font-weight:700;margin-bottom:4px;}.person-team{font-size:11pt;font-weight:400;color:#888;}.person-sasu{font-size:9pt;color:#666;}.grade-circle{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12pt;font-weight:700;}.total-row{display:flex;align-items:center;background:#fff;border:1px solid #eee;border-radius:10px;padding:12px 14px;margin-bottom:10px;gap:12px;}.total-score-box{text-align:center;min-width:70px;}.total-num{font-size:22pt;font-weight:700;color:#1a1a1a;}.total-denom{font-size:9pt;color:#aaa;}.ins-box{min-width:80px;text-align:center;border-left:1px solid #eee;padding-left:14px;}.cat-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px;}.cat-sum-box{border:1px solid #eee;border-radius:8px;padding:8px 10px;}.cat-sum-label{font-size:7.5pt;font-weight:700;letter-spacing:.03em;margin-bottom:3px;}.cat-sum-score{font-size:13pt;font-weight:700;color:#1a1a1a;}.cat-sum-max{font-size:8pt;color:#ccc;font-weight:400;}.detail-section{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}.cat-block{border:1px solid #f0f0f0;border-radius:8px;padding:9px 11px;background:#fdfdfd;}.cat-block-title{font-size:8.5pt;font-weight:700;color:#333;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}.cat-block-score{font-size:8pt;font-weight:700;}.item-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f5f5f5;}.item-row:last-child{border-bottom:none;}.item-name{font-size:8.5pt;color:#444;flex:1;}.item-right{display:flex;align-items:center;gap:4px;flex-shrink:0;}.item-score{font-size:8pt;font-weight:700;padding:1px 6px;border-radius:10px;}.item-word{font-size:7.5pt;color:#999;min-width:26px;}.comment-section{display:grid;grid-template-columns:1fr 1fr;gap:8px;}.comment-box{border-radius:8px;padding:10px 12px;}.comment-box.good{background:#F0FDF4;border:1px solid #BBF7D0;}.comment-box.improve{background:#FFFBEB;border:1px solid #FDE68A;}.comment-label{font-size:8.5pt;font-weight:700;margin-bottom:5px;color:#444;}.comment-text{font-size:9pt;color:#333;line-height:1.6;}.person+.person{border-top:2px dashed #e5e7eb;padding-top:24px;}`;
  const html=`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>평가보고서_${fmtDate(dateLabel)}</title><style>${css}</style></head><body><div class="cover"><div class="cover-title">수습사원 중간평가 보고서</div><div class="cover-meta"><span>평가 기준일: ${fmtDateKo(dateLabel)}</span><span>생성일시: ${nowDT()}</span><span>총 ${dataList.length}명</span></div></div>${body}<script>window.addEventListener('load',function(){setTimeout(function(){window.print();},400);});<\/script></body></html>`;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const w=window.open(url,'_blank');
  if(!w)alert('팝업이 차단되었습니다. 브라우저에서 팝업을 허용해주세요.');
  setTimeout(()=>URL.revokeObjectURL(url),60000);
}

function dlPDFSingle(traineeId){const e=evals.find(x=>x.trainee_id===traineeId);if(!e)return;printReport([e],e.eval_date);}
function dlPDFByDay(day){const list=evals.filter(e=>e.eval_date===day);if(!list.length){alert('해당 평가일에 제출된 평가서가 없습니다.');return;}printReport(list,day);}

function renderAll(){renderMetrics();renderTraineeList();renderDayTabs();renderTable();}

function renderMetrics(){
  const total=trainees.length,done=evals.length;
  document.getElementById('am-total').textContent=total;
  document.getElementById('am-done').textContent=done;
  const rate=total?Math.round(done/total*100):0;
  document.getElementById('am-rate').textContent=rate+'%';
  document.getElementById('am-rate-bar').style.width=rate+'%';
  if(done){const avg=Math.round(evals.reduce((s,e)=>s+(e.total_score||0),0)/done);document.getElementById('am-avg').textContent=avg;document.getElementById('am-avg-sub').textContent=`점 (${evals[0]?.max_score||60}점 만점)`;}
  else document.getElementById('am-avg').textContent='—';
}

function renderDayTabs(){
  const days=[...new Set(evals.map(e=>e.eval_date))].filter(Boolean).sort();
  const tabEl=document.getElementById('day-tabs'),contEl=document.getElementById('day-content');
  if(!days.length){tabEl.innerHTML='<span style="font-size:12px;color:var(--text-faint)">제출된 평가서가 없습니다.</span>';contEl.innerHTML='';return;}
  if(!selDayTab||!days.includes(selDayTab))selDayTab=days[days.length-1];
  tabEl.innerHTML=days.map(d=>`<button class="daytab${d===selDayTab?' active':''}" onclick="selectDayTab('${d}')">${fmtDate(d)}</button>`).join('');
  renderDayContent();
}
function selectDayTab(day){selDayTab=day;renderDayTabs();}
function renderDayContent(){
  const el=document.getElementById('day-content');
  const dayData=evals.filter(e=>e.eval_date===selDayTab);
  if(!dayData.length){el.innerHTML='<div style="font-size:12px;color:var(--text-faint);padding:8px 0">해당 날짜에 제출된 평가서가 없습니다.</div>';return;}
  const avg=Math.round(dayData.reduce((s,d)=>s+(d.total_score||0),0)/dayData.length);
  const top=dayData.slice().sort((a,b)=>(b.total_score||0)-(a.total_score||0))[0];
  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px">
      <div class="day-stats">
        <div class="day-stat"><span>평가 인원</span><strong>${dayData.length}명</strong></div>
        <div class="day-stat"><span>평균 점수</span><strong>${avg}점</strong></div>
        <div class="day-stat"><span>최고 등급</span><strong>${top.trainee_name} (${top.grade}등급)</strong></div>
      </div>
      <button class="btn teal" onclick="dlPDFByDay('${selDayTab}')"><i class="ti ti-file-download" style="font-size:12px"></i>${fmtDate(selDayTab)} 평가일 전체 PDF</button>
    </div>
    <div class="day-cards-grid">
      ${dayData.map(d=>{const gc={S:'gS',A:'gA',B:'gB',C:'gC'}[d.grade];const cs=d.cat_scores||{};
        return`<div class="t-day-card">
          <div class="t-day-header"><div><div style="font-size:13px;font-weight:700">${d.trainee_name}</div><div style="font-size:11px;color:var(--text-muted)">${d.trainee_team}</div></div><span class="gpill ${gc}">${d.grade}등급</span></div>
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:5px">총점 <strong style="color:var(--text)">${d.total_score}/${d.max_score}</strong> · 지시이행 <strong style="color:var(--text)">${d.ins_score}/${d.ins_max}</strong></div>
          <div style="font-size:10px;color:var(--text-faint);margin-bottom:7px"><i class="ti ti-clock" style="font-size:10px"></i> ${d.submit_datetime}</div>
          <div class="cat-mini">${Object.entries(cs).map(([k,s])=>`<span class="cat-mini-item">${CAT_KO[k]} ${s}점</span>`).join('')}</div>
          <button class="btn" style="width:100%;justify-content:center;margin-top:8px" onclick="dlPDFSingle('${d.trainee_id}')"><i class="ti ti-file-download" style="font-size:11px"></i>개별 PDF</button>
        </div>`;}).join('')}
    </div>`;
}

function renderTable(){
  const tbody=document.getElementById('admin-tbody');
  if(!trainees.length){tbody.innerHTML='<tr><td colspan="9" style="text-align:center;padding:28px;color:var(--text-faint)">수습사원을 추가하면 여기에 표시됩니다.</td></tr>';return;}
  tbody.innerHTML=trainees.map(t=>{
    const e=evals.find(x=>x.trainee_id===t.id);
    const sasuStr=t.sasu2?`${t.sasu1} · ${t.sasu2}`:t.sasu1;
    if(e){
      const gc={S:'gS',A:'gA',B:'gB',C:'gC'}[e.grade];
      const ir=(e.ins_score||0)/(e.ins_max||20);
      const ic=ir>=.8?'#3B6D11':ir>=.6?'#854F0B':'#A32D2D';
      const cs=e.cat_scores||{};const ratings=e.ratings||{};
      return`<tr id="mtr-${t.id}">
        <td style="font-weight:700">${t.name}</td><td>${t.team}</td>
        <td style="color:var(--text-muted);font-size:11px;white-space:normal">${sasuStr}</td>
        <td style="color:var(--text-muted);font-size:11px">${e.submit_datetime}</td>
        <td>${e.total_score}/${e.max_score}</td>
        <td style="font-weight:700;color:${ic}">${e.ins_score}/${e.ins_max}</td>
        <td><span class="gpill ${gc}">${e.grade}등급</span></td>
        <td><span class="chip cdone"><i class="ti ti-check" style="font-size:10px"></i>완료</span></td>
        <td><div style="display:flex;gap:3px">
          <button class="btn" onclick="toggleDetail('${t.id}')">상세</button>
          <button class="btn" title="PDF" onclick="dlPDFSingle('${t.id}')"><i class="ti ti-file-download" style="font-size:11px"></i></button>
        </div></td>
      </tr>
      <tr class="detail-tr" id="dtr-${t.id}"><td colspan="9" style="padding:0">
        <div class="detail-panel">
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px"><i class="ti ti-calendar" style="font-size:11px"></i> 입사일 ${fmtDate(e.join_date)} &nbsp;·&nbsp; 평가 기준일 ${fmtDate(e.eval_date)} &nbsp;·&nbsp; <i class="ti ti-clock" style="font-size:11px"></i> 제출 ${e.submit_datetime}</div>
          <div class="score-grid">${Object.entries(cs).map(([k,s])=>`<div class="score-box" style="${k==='instruction'?'border-color:#F4C0D1':''}"><div class="score-box-label">${CAT_KO[k]}</div><div class="score-box-val">${s}<span>/${CRITERIA[k].length*5}</span></div></div>`).join('')}</div>
          ${Object.entries(CRITERIA).map(([cat,items])=>`<div class="cat-div">${CAT_KO[cat]}</div>${items.map(c=>`<div class="drow"><span>${c.label}</span><span><span style="color:var(--text-muted);font-size:11px;margin-right:5px">${SL[ratings[c.id]||0]}</span><strong>${ratings[c.id]||0}/5</strong></span></div>`).join('')}`).join('')}
          ${e.strength?`<div class="cat-div" style="margin-top:10px">잘하는 점</div><div style="font-size:12px;padding:4px 0">${e.strength}</div>`:''}
          ${e.improve?`<div class="cat-div">개선이 필요한 점</div><div style="font-size:12px;padding:4px 0">${e.improve}</div>`:''}
        </div>
      </td></tr>`;
    }else{
      return`<tr>
        <td style="font-weight:700">${t.name}</td><td>${t.team}</td>
        <td style="color:var(--text-muted);font-size:11px;white-space:normal">${sasuStr}</td>
        <td>—</td><td>—</td><td>—</td>
        <td><span class="gpill gP">—</span></td>
        <td><span class="chip cwait"><i class="ti ti-clock" style="font-size:10px"></i>대기중</span></td><td></td>
      </tr>`;
    }
  }).join('');
}

function toggleDetail(tid){
  const tr=document.getElementById('dtr-'+tid);if(!tr)return;
  const show=!tr.classList.contains('show');tr.classList.toggle('show',show);
  const mtr=document.getElementById('mtr-'+tid);
  if(mtr){const btn=mtr.querySelector('button');if(btn)btn.textContent=show?'닫기':'상세';}
}

loadAll();
</script>
</body>
